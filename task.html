<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание семинара</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Neue', cursive, sans-serif;
            background: linear-gradient(135deg, #fffde7 0%, #fff9c4 100%);
            color: #5d4037;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .star-top-right {
            position: absolute;
            top: 50px;
            right: 50px;
            font-size: 45px;
            color: #ffd54f;
            opacity: 0.8;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 60px 20px;
            z-index: 1;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #f57f17;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .task-content {
            background: white;
            padding: 70px 50px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(255, 213, 79, 0.15);
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            border: 3px solid #fff8e1;
        }

        .task-title {
            font-size: 32px;
            font-weight: 700;
            color: #ffc107;
            margin-bottom: 35px;
            line-height: 1.3;
        }

        .task-text {
            font-size: 24px;
            font-weight: 500;
            color: #ffa000;
            line-height: 1.6;
            margin-bottom: 45px;
        }

             .back-link {
            display: inline-block;
            padding: 16px 40px;
            background-color: #fff8e1;
            color: #f57f17;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #ffd54f;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transition: left 0.6s;
            z-index: -1;
        }

        .back-link:hover {
            background-color: #ffd54f;
            color: #333;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 213, 79, 0.3);
        }

        .back-link:hover::before {
            left: 100%;
        }

        footer {
            text-align: center;
            padding: 25px 20px;
            color: #ffc107;
            font-size: 14px;
            border-top: 1px solid #fff59d;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>
   

    <div class="container">
        <div class="logo"></div>
        <div class="task-content">
            <h2 class="task-title">задание</h2>
            <p class="task-text">Найди 4 человек и предложи вместе сказать хором «Мы отличная команда!»</p>
            <a href="index.html" class="back-link">Вернуться на главную</a>
        </div>
    </div>

    <footer></footer>
</body>
</html>
